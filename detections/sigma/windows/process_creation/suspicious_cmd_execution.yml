title: Suspicious Windows Command Shell Execution
id: 6e90d85e-4476-4a9f-ac12-pt2026002
status: experimental
description: Detects suspicious cmd.exe execution patterns validated in PT-2026-002.
references:
  - https://attack.mitre.org/techniques/T1059/003/
author: mell0wx
logsource:
  product: windows
  category: process_creation
detection:
  selection_batch:
    Image|endswith: '\cmd.exe'
    CommandLine|contains:
      - 'pt-2026-002-positive.cmd'
  selection_variant:
    Image|endswith: '\cmd.exe'
    CommandLine|contains:
      - '%LOCALAPPDATA:~-3,1%md /c'
  condition: selection_batch or selection_variant
falsepositives:
  - Controlled validation activity
level: high
tags:
  - attack.execution
  - attack.t1059.003
