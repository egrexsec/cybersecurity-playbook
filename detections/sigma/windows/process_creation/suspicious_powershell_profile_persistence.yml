title: Suspicious PowerShell Profile Persistence Modification
id: 86cd3d91-3ef6-4c72-99ab-1db6a4f74f29
status: test
description: >-
  Detects PowerShell profile persistence when PowerShell modifies profile.ps1 and references staged marker execution content as observed during PT-2026-009 validation.
references:
  - https://attack.mitre.org/techniques/T1546/013/
author: mell0wx
logsource:
  product: windows
  category: process_creation
detection:
  sel_ps_img:
    Image|endswith: '\powershell.exe'
  sel_ps_cli_original:
    CommandLine|contains|all:
      - 'Add-Content'
      - 'pt-2026-009-original.txt'
  sel_ps_cli_variant:
    CommandLine|contains|all:
      - 'Add-Content'
      - 'pt-2026-009-variant.txt'
  condition: sel_ps_img and (sel_ps_cli_original or sel_ps_cli_variant)
falsepositives:
  - Controlled validation activity
  - Intentional profile scripting experiments in a lab
date: 2026-07-18
level: high
tags:
  - attack.persistence
  - attack.t1546.013
