title: Suspicious PowerShell Profile Persistence Modification
id: 86cd3d91-3ef6-4c72-99ab-1db6a4f74f29
status: test
description: >-
  Detects PowerShell processes that modify a PowerShell profile script using common file-writing commands.
references:
  - https://attack.mitre.org/techniques/T1546/013/
author: mell0wx
logsource:
  product: windows
  category: process_creation
detection:
  sel_ps_img:
    Image|endswith: '\powershell.exe'
  sel_profile:
    CommandLine|contains:
      - '$PROFILE'
      - 'profile.ps1'
  sel_write:
    CommandLine|contains:
      - 'Add-Content'
      - 'Set-Content'
      - 'Out-File'
      - '>>'
  sel_payload:
    CommandLine|contains:
      - 'Set-Content'
      - 'Invoke-Expression'
      - 'FromBase64String'
      - '$payload'
      - 'DownloadString'
      - 'Start-Process'
      - 'Net.WebClient'
  condition: sel_ps_img and sel_profile and sel_write and sel_payload
falsepositives:
  - Controlled validation activity
  - Intentional profile scripting experiments in a lab
date: 2026-07-18
level: high
tags:
  - attack.persistence
  - attack.t1546.013
