name: detection-validation

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema PyYAML sigma-cli
          sigma plugin install splunk elasticsearch windows sysmon

      - name: Schema validation
        run: python3 playbook validate

      - name: Sigma metadata lint
        run: python3 playbook --json sigma lint

      - name: Sigma conversion
        run: python3 playbook --json sigma convert --target all

      - name: Sigma fixture tests
        run: python3 playbook --json test fixtures

      - name: Previous-scenario validation record check
        run: python3 playbook --json validate previous-scenarios

      - name: Metrics generation check
        run: python3 playbook --json metrics

      - name: Markdown link check
        run: python3 automation/validators/check_markdown.py

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
