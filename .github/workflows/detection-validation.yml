name: detection-validation

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            jsonschema \
            PyYAML \
            sigma-cli==3.1.0 \
            pySigma==1.4.0 \
            pysigma-backend-splunk==2.1.0 \
            pysigma-backend-elasticsearch==2.1.0 \
            pysigma-pipeline-windows==2.0.0 \
            pysigma-pipeline-sysmon==2.0.0

      - name: Schema validation
        run: python3 playbook validate

      - name: Unit and security tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Public-safety validation
        run: python3 automation/validators/public_safety.py

      - name: Sigma metadata lint
        run: python3 playbook --json sigma lint

      - name: Sigma conversion
        run: python3 playbook --json sigma convert --target all

      - name: Generated output freshness
        run: git diff --exit-code -- detections/generated

      - name: Sigma fixture tests
        run: python3 playbook --json test fixtures

      - name: Previous-scenario validation record check
        run: python3 playbook --json validate previous-scenarios

      - name: Metrics generation check
        run: python3 playbook --json metrics

      - name: Markdown link check
        run: python3 automation/validators/check_markdown.py

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
