id: HUNT-2026-011
title: Hunt for Suspicious Regsvr32 Proxy Execution
status: completed
hypothesis: >-
  If an adversary uses regsvr32.exe as a signed proxy execution primitive, the victim should emit
  process creation telemetry that distinguishes suspicious local scriptlet or non-DLL-extension registration behavior from benign DLL registration or help output.
attack:
  - T1218.010
required_data:
  - Sysmon Event ID 1
  - optional image-load/file-write telemetry
target_systems:
  - AUTHORIZED-LAB-ENDPOINT
baseline_query: windows-baseline-regsvr32-counts
hunt_query: suspicious-regsvr32-proxy-execution
investigation_pivots:
  - regsvr32.exe with scrobj.dll
  - regsvr32.exe targeting non-standard extensions like .jpg
  - related image loads and staged temp files
known_legitimate_activity:
  - standard DLL registration
  - regsvr32 help output
success_criteria:
  - positive regsvr32 proxy-execution paths are visible in Sysmon
  - a behavior-based rule detects both positive variants
  - benign registration/help/query activity stays quiet
detection_opportunity: >-
  Detect regsvr32 execution when it is used with local SCT/scrobj patterns or when a non-DLL extension is supplied as the registration target.
results:
  - positive non-DLL extension registration path triggered the Sigma detection in Splunk
  - positive local SCT/scrobj path triggered the Sigma detection in Splunk
  - benign DLL registration did not trigger the detection
  - benign regsvr32 help output did not trigger the detection
  - benign registry query did not trigger the detection
conclusion: validated
